<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業時間 グラフダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; font-size: 13px; background: #f0f2f5; }
  header {
    background: #1a73e8; color: white;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 17px; }
  .status { font-size: 11px; opacity: .8; margin-left: auto; }

  .controls {
    background: white; border-bottom: 1px solid #ddd;
    padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .controls label { font-size: 12px; font-weight: bold; color: #555; }
  .controls select, .controls input[type=date] {
    border: 1px solid #ccc; border-radius: 6px;
    padding: 5px 8px; font-size: 12px; cursor: pointer;
  }
  .btn {
    padding: 6px 16px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: bold; cursor: pointer;
    background: #1a73e8; color: white;
  }
  .btn:hover { background: #1558b0; }

  .section-title {
    font-size: 15px; font-weight: bold; color: #333;
    padding: 18px 20px 6px; border-left: 4px solid #1a73e8;
    margin: 0 20px 8px; border-radius: 0 4px 4px 0;
    background: white;
  }

  .chart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
    gap: 16px; padding: 0 20px 20px;
  }
  .chart-card {
    background: white; border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
    padding: 16px 20px;
  }
  .chart-card h3 {
    font-size: 13px; color: #444; margin-bottom: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .chart-card h3 .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .chart-wrap { position: relative; height: 280px; }

  .dow-tabs {
    display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap;
  }
  .dow-tab {
    padding: 5px 14px; border-radius: 20px; border: 1.5px solid #ccc;
    font-size: 12px; font-weight: bold; cursor: pointer;
    background: white; color: #666; transition: all .15s;
  }
  .dow-tab.active { border-color: #1a73e8; background: #1a73e8; color: white; }
  .dow-tab:hover:not(.active) { border-color: #1a73e8; color: #1a73e8; }

  .loading {
    text-align: center; padding: 60px 20px; color: #888;
    font-size: 14px;
  }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid #ddd; border-top-color: #1a73e8;
    border-radius: 50%; animation: spin .8s linear infinite;
    margin-bottom: 10px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #c62828; }

  .summary-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 10px 20px; background: #e8f0fe; border-bottom: 1px solid #c5cae9;
  }
  .summary-item { font-size: 13px; font-weight: bold; }
  .summary-item .val { font-size: 16px; }
</style>
</head>
<body>

<header>
  <h1>📊 作業時間 グラフダッシュボード</h1>
  <span class="status" id="status">読み込み中...</span>
</header>

<div class="controls">
  <label>表示期間</label>
  <input type="date" id="rangeStart">
  <span style="font-size:12px">〜</span>
  <input type="date" id="rangeEnd">
  <button class="btn" onclick="applyRange()">更新</button>
  <button class="btn" style="background:#34a853" onclick="setRange(30)">直近30日</button>
  <button class="btn" style="background:#34a853" onclick="setRange(90)">直近90日</button>
  <button class="btn" style="background:#9c27b0" onclick="setRange(0)">全期間</button>
</div>

<div class="summary-bar" id="summaryBar">
  <span class="summary-item">社員：<span class="val" id="sumS" style="color:#1a73e8">--</span> 分</span>
  <span class="summary-item">準社員：<span class="val" id="sumP" style="color:#9c27b0">--</span> 分</span>
  <span class="summary-item">アルバイト：<span class="val" id="sumA" style="color:#e65100">--</span> 分</span>
  <span class="summary-item">合計：<span class="val" id="sumAll" style="color:#333">--</span> 分 ／ <span id="sumDays">--</span> 日</span>
</div>

<div id="mainContent">
  <div class="loading"><span class="spinner"></span><br>データ取得中...</div>
</div>

<script>
const SUPABASE_URL = 'https://cfjcrdczfyzqepreluqn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PxeXUC7XVtPhOTXlHKIu_Q_EV5f1Gco';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

const BLOCK_NAMES  = ['社員', '準社員', 'アルバイト'];
const BLOCK_COLORS = ['#1a73e8', '#9c27b0', '#e65100'];
const BLOCK_BG     = ['rgba(26,115,232,.15)', 'rgba(156,39,176,.15)', 'rgba(230,81,0,.15)'];
const DOW_NAMES    = ['日', '月', '火', '水', '木', '金', '土'];

let allRows = [];       // 全レコード
let filteredRows = [];  // フィルタ後
let charts = {};        // Chart インスタンス
let activeDow = 1;      // 0=日〜6=土

// ─────────────────────────────────
// 初期化
// ─────────────────────────────────
async function init() {
  await loadAll();
  initDateRange();
  applyRange();
}

async function loadAll() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/records?select=date,block_idx,people&order=date.asc`,
      { headers: HEADERS }
    );
    allRows = await res.json();
    if (!Array.isArray(allRows)) throw new Error('取得失敗');
    document.getElementById('status').textContent =
      `${allRows.length} レコード取得済み`;
  } catch(e) {
    document.getElementById('status').textContent = '接続エラー';
    document.getElementById('mainContent').innerHTML =
      `<div class="loading err">❌ データ取得に失敗しました。<br>${e.message}</div>`;
    throw e;
  }
}

function initDateRange() {
  if (!allRows.length) return;
  const dates = allRows.map(r => r.date).sort();
  document.getElementById('rangeStart').value = dates[0];
  document.getElementById('rangeEnd').value   = dates[dates.length - 1];
}

function setRange(days) {
  const end = new Date();
  const endStr = end.toISOString().slice(0, 10);
  let startStr;
  if (days === 0) {
    const dates = allRows.map(r => r.date).sort();
    startStr = dates[0] || endStr;
  } else {
    const start = new Date(end);
    start.setDate(start.getDate() - days + 1);
    startStr = start.toISOString().slice(0, 10);
  }
  document.getElementById('rangeStart').value = startStr;
  document.getElementById('rangeEnd').value   = endStr;
  applyRange();
}

function applyRange() {
  const s = document.getElementById('rangeStart').value;
  const e = document.getElementById('rangeEnd').value;
  filteredRows = allRows.filter(r => (!s || r.date >= s) && (!e || r.date <= e));
  renderAll();
}

// ─────────────────────────────────
// 集計ヘルパー
// ─────────────────────────────────
function peopleMin(people) {
  try {
    return (JSON.parse(people) || []).reduce((s, p) => s + (parseInt(p.min) || 0), 0);
  } catch { return 0; }
}

// date → { 0: 分, 1: 分, 2: 分 }
function aggregateByDate(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.date]) map[r.date] = { 0: 0, 1: 0, 2: 0 };
    map[r.date][r.block_idx] += peopleMin(r.people);
  });
  return map;
}

// ─────────────────────────────────
// メイン描画
// ─────────────────────────────────
function renderAll() {
  destroyCharts();

  const byDate = aggregateByDate(filteredRows);
  const dates  = Object.keys(byDate).sort();

  // サマリー更新
  let sumS = 0, sumP = 0, sumA = 0;
  dates.forEach(d => { sumS += byDate[d][0]; sumP += byDate[d][1]; sumA += byDate[d][2]; });
  document.getElementById('sumS').textContent    = sumS.toLocaleString();
  document.getElementById('sumP').textContent    = sumP.toLocaleString();
  document.getElementById('sumA').textContent    = sumA.toLocaleString();
  document.getElementById('sumAll').textContent  = (sumS + sumP + sumA).toLocaleString();
  document.getElementById('sumDays').textContent = dates.length;

  // メインコンテンツ構築
  document.getElementById('mainContent').innerHTML = `
    <div style="padding:18px 20px 0;">
      <div style="font-size:15px;font-weight:bold;color:#333;border-left:4px solid #1a73e8;padding-left:10px;margin-bottom:12px;">
        ① 1日ごとの推移
      </div>
    </div>
    <div class="chart-grid" id="trendGrid">
      <div class="chart-card">
        <h3><span class="dot" style="background:#1a73e8"></span>社員</h3>
        <div class="chart-wrap"><canvas id="trendS"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><span class="dot" style="background:#9c27b0"></span>準社員</h3>
        <div class="chart-wrap"><canvas id="trendP"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><span class="dot" style="background:#e65100"></span>アルバイト</h3>
        <div class="chart-wrap"><canvas id="trendA"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>全区分まとめ（積み上げ）</h3>
        <div class="chart-wrap"><canvas id="trendAll"></canvas></div>
      </div>
    </div>

    <div style="padding:18px 20px 0;">
      <div style="font-size:15px;font-weight:bold;color:#333;border-left:4px solid #9c27b0;padding-left:10px;margin-bottom:10px;">
        ② 曜日ごとの比較
      </div>
    </div>
    <div class="dow-tabs" id="dowTabs"></div>
    <div class="chart-grid" id="dowGrid">
      <div class="chart-card">
        <h3 id="dowChartTitle">-- 曜日のみ 区分別推移</h3>
        <div class="chart-wrap" style="height:300px"><canvas id="dowChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 id="dowTotalTitle">-- 曜日のみ 合計推移</h3>
        <p style="font-size:11px;color:#888;margin:-10px 0 10px;">合計（黒太線）＋各区分の内訳（点線）</p>
        <div class="chart-wrap" style="height:270px"><canvas id="dowTotal"></canvas></div>
      </div>
      <div class="chart-card" style="grid-column: 1 / -1;">
        <h3 id="dowWeekAvgTitle">全曜日の平均比較 <span style="font-size:11px;color:#888;font-weight:normal;">― 選択中の曜日を強調・括弧内はデータ件数</span></h3>
        <p style="font-size:11px;color:#888;margin:-10px 0 10px;">期間内の各曜日における1日あたり平均作業時間（分）を区分別に比較</p>
        <div class="chart-wrap" style="height:300px"><canvas id="dowWeekAvg"></canvas></div>
      </div>
    </div>
  `;

  buildTrendCharts(dates, byDate);
  buildDowTabs(dates, byDate);
}

// ─────────────────────────────────
// ① 推移チャート
// ─────────────────────────────────
function buildTrendCharts(dates, byDate) {
  const labels = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const dow = DOW_NAMES[dt.getDay()];
    return `${d.slice(5).replace('-','/')}(${dow})`;
  });

  const vals = [0, 1, 2].map(bi => dates.map(d => byDate[d][bi]));

  // 個別3本
  [0, 1, 2].forEach(bi => {
    const id = ['trendS', 'trendP', 'trendA'][bi];
    charts[id] = new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: BLOCK_NAMES[bi],
          data: vals[bi],
          borderColor: BLOCK_COLORS[bi],
          backgroundColor: BLOCK_BG[bi],
          borderWidth: 2,
          pointRadius: dates.length > 60 ? 0 : 3,
          pointHoverRadius: 5,
          fill: true,
          tension: 0.3
        }]
      },
      options: trendOpts(BLOCK_NAMES[bi] + ' 作業時間（分）')
    });
  });

  // 積み上げ
  charts['trendAll'] = new Chart(document.getElementById('trendAll'), {
    type: 'bar',
    data: {
      labels,
      datasets: [0, 1, 2].map(bi => ({
        label: BLOCK_NAMES[bi],
        data: vals[bi],
        backgroundColor: BLOCK_COLORS[bi],
        borderRadius: 2,
        stack: 'stk'
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { stacked: true, ticks: { font: { size: 10 }, maxRotation: 45,
          maxTicksLimit: 20 } },
        y: { stacked: true, beginAtZero: true,
          title: { display: true, text: '合計時間（分）', font: { size: 11 } } }
      }
    }
  });
}

function trendOpts(yLabel) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { mode: 'index', intersect: false }
    },
    scales: {
      x: { ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 20 } },
      y: { beginAtZero: true,
        title: { display: true, text: yLabel, font: { size: 11 } } }
    }
  };
}

// ─────────────────────────────────
// ② 曜日別チャート
// ─────────────────────────────────
function buildDowTabs(dates, byDate) {
  // 存在する曜日だけタブ表示
  const existDow = new Set(dates.map(d => new Date(d + 'T00:00:00').getDay()));
  const tabs = document.getElementById('dowTabs');
  tabs.innerHTML = '';

  DOW_NAMES.forEach((name, dow) => {
    if (!existDow.has(dow)) return;
    const btn = document.createElement('button');
    btn.className = 'dow-tab' + (dow === activeDow ? ' active' : '');
    btn.textContent = name + '曜日';
    btn.onclick = () => {
      activeDow = dow;
      document.querySelectorAll('.dow-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDowChart(dates, byDate, dow);
    };
    tabs.appendChild(btn);
  });

  // 初期表示：activeDow が存在しない場合は最初の曜日に切り替え
  if (!existDow.has(activeDow)) {
    activeDow = [...existDow].sort()[0];
  }
  renderDowChart(dates, byDate, activeDow);
}

function renderDowChart(dates, byDate, dow) {
  const dowDates = dates.filter(d => new Date(d + 'T00:00:00').getDay() === dow);
  const labels   = dowDates.map(d => d.slice(5).replace('-', '/'));

  const vals   = [0, 1, 2].map(bi => dowDates.map(d => byDate[d][bi]));
  const totals = dowDates.map((_, i) => vals[0][i] + vals[1][i] + vals[2][i]);

  const dowName = DOW_NAMES[dow];
  document.getElementById('dowChartTitle').textContent = `${dowName}曜日のみ 区分別推移`;
  document.getElementById('dowTotalTitle').textContent = `${dowName}曜日のみ 合計推移`;

  const ptR = n => n > 30 ? 2 : 4;

  // ① 区分別推移（折れ線）
  if (charts['dowChart']) charts['dowChart'].destroy();
  charts['dowChart'] = new Chart(document.getElementById('dowChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [0, 1, 2].map(bi => ({
        label: BLOCK_NAMES[bi],
        data: vals[bi],
        borderColor: BLOCK_COLORS[bi],
        backgroundColor: BLOCK_BG[bi],
        borderWidth: 2.5,
        pointRadius: ptR(dowDates.length),
        pointHoverRadius: 6,
        fill: false,
        tension: 0.3
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 16 } },
        y: { beginAtZero: true,
          title: { display: true, text: '作業時間（分）', font: { size: 11 } } }
      }
    }
  });

  // ② 合計推移（折れ線）＋各区分を点線で重ね表示
  if (charts['dowTotal']) charts['dowTotal'].destroy();
  charts['dowTotal'] = new Chart(document.getElementById('dowTotal'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '合計',
          data: totals,
          borderColor: '#37474f',
          backgroundColor: 'rgba(55,71,79,0.1)',
          borderWidth: 3,
          pointRadius: ptR(dowDates.length),
          pointHoverRadius: 6,
          fill: true,
          tension: 0.3,
          order: 0
        },
        ...[0, 1, 2].map(bi => ({
          label: BLOCK_NAMES[bi],
          data: vals[bi],
          borderColor: BLOCK_COLORS[bi],
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 0,
          pointHoverRadius: 4,
          fill: false,
          tension: 0.3,
          order: bi + 1
        }))
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 },
          filter: item => true } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 16 } },
        y: { beginAtZero: true,
          title: { display: true, text: '合計作業時間（分）', font: { size: 11 } } }
      }
    }
  });

  // ③ 全曜日の平均比較（グループ棒）― 選択中の曜日を強調
  // 全期間フィルタ済みの dates / byDate から各曜日の平均を計算
  const weekStats = DOW_NAMES.map((_, d) => {
    const dd = dates.filter(x => new Date(x + 'T00:00:00').getDay() === d);
    if (!dd.length) return { avgs: [0, 0, 0], count: 0 };
    const avgs = [0, 1, 2].map(bi =>
      Math.round(dd.reduce((s, x) => s + byDate[x][bi], 0) / dd.length)
    );
    return { avgs, count: dd.length };
  });

  const weekLabels = DOW_NAMES.map((n, d) =>
    weekStats[d].count ? `${n}曜(${weekStats[d].count})` : `${n}曜`
  );

  if (charts['dowWeekAvg']) charts['dowWeekAvg'].destroy();
  charts['dowWeekAvg'] = new Chart(document.getElementById('dowWeekAvg'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [0, 1, 2].map(bi => ({
        label: BLOCK_NAMES[bi],
        data: weekStats.map(w => w.avgs[bi]),
        // 選択曜日は不透明・他は薄く
        backgroundColor: DOW_NAMES.map((_, d) =>
          d === dow ? BLOCK_COLORS[bi] : BLOCK_COLORS[bi] + '44'
        ),
        borderColor: DOW_NAMES.map((_, d) =>
          d === dow ? BLOCK_COLORS[bi] : BLOCK_COLORS[bi] + '99'
        ),
        borderWidth: DOW_NAMES.map((_, d) => d === dow ? 2.5 : 1),
        borderRadius: 4
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            title: items => {
              const d = items[0].dataIndex;
              const cnt = weekStats[d].count;
              return `${DOW_NAMES[d]}曜日（${cnt}日分の平均）${d === dow ? ' ◀ 選択中' : ''}`;
            },
            footer: items => {
              const total = items.reduce((s, i) => s + (i.raw || 0), 0);
              return `合計平均: ${total.toLocaleString()} 分`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 11 } } },
        y: { beginAtZero: true,
          title: { display: true, text: '1日あたり平均（分）', font: { size: 11 } } }
      }
    }
  });
}

// ─────────────────────────────────
// Chart 後始末
// ─────────────────────────────────
function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

// ─────────────────────────────────
// 起動
// ─────────────────────────────────
init();
</script>
</body>
</html>
